<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="shortcut icon" href="../favicon/RMD logotipo transparente 50px.png" type="image/x-icon">
    <link rel="stylesheet" href="../cabeçario_sem_login/cabeçario.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <a href="../index.html"><img src="../Logotipo/RMD logotipo transparente.png" alt="logotipo RMD" class="logotipo"></a>
    <section class="int_login">
        <h2>Faça o seu login</h2>      
        <div class="inserir">
            <input type="email" placeholder="Insira o seu Email">
        </div>
        <div class="inserir">            
            <input type="password" placeholder="Palavra passe">
        </div>
        <div class="botoes">
            <button>Inciar sessão</button>
        </div>
        <p class="esquecipass"><a href="#" target="_self" rel="next">Esqueci a palavra passe</a></p>
        <p>Caso seja novo por aqui <span id="criarCon">Criar conta.</span></p>
              
    </section> 
    <section class="newAccount" id="newAccount">
        <span id="fechar"> &larr; Voltar para o login</span>

        <h2>Preencha os dados da conta</h2>
        <div class="formulario" id="form">  
            <div class="param">
                <label for="name">Nome completo</label>
                <input type="text" placeholder="Insira o nome completo" id='name'>
            </div>
            
            <div class="param">
                <label for="user">Nome de usuário</label>
                <input type="text" placeholder="Insira o nome de usuário" id='user'>
            </div>

            <div class="param">
                <label for="email">Email</label>
                <input type="email" placeholder="Insira o seu email">

            </div>
            
            <div class="pass">
                <div class="param">
                    <label for="password[0]">Palavra passe</label>
                    <input type="password" placeholder="Insira a palavra passe" Name='password'>
                </div>
                <div class="param">
                    <label for="password[1]">Confirmar palavra passe</label>
                    <input type="password" placeholder="Confirme sua palavra passe" Name='password'>
                </div>
            </div> 

            <div class="checkboxes">
                <div class="box">
                    <input type="checkbox" id='terms'>
                    <label for="terms">I accept the terms and conditions.</label>                   
                </div>
                <div class="box">
                    <input type="checkbox" id='noti'>
                    <label for="terms">I want to be notified about every news.</label>                  
                </div>
            </div>
            <button>Criar conta</button>   
        </div>       
    </section> 

    <p>Johnny é gay</p>
    <script src="login.js"></script>  
</body>
</html>
